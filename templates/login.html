<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <form action="/login" method="POST" class="bg-white p-8 rounded-lg shadow-md w-80">
        <h2 class="text-xl font-bold mb-4">Login Admin</h2>
        <input type="password" name="password" placeholder="Masukkan Password" required 
               class="w-full p-2 border rounded mb-4">
        <button type="submit" class="w-full bg-orange-600 text-white py-2 rounded">Masuk</button>
    </form>
</body>
</html>
